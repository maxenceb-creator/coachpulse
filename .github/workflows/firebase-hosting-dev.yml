# Deploy the dev branch to a Firebase Hosting preview channel.
# PROD remains protected on main through firebase-hosting-merge.yml.

name: Deploy to Firebase Hosting DEV
on:
  push:
    branches:
      - dev
jobs:
  build_and_deploy_dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COACH_PULSE_EE6B0 }}
          projectId: coach-pulse-ee6b0
          channelId: dev
